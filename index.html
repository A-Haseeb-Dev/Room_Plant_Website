
<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Room Plant | Buy Room Plants Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: '#4CAF50',
              secondary: '#FFFFFF',
              accent: '#A67B5B',
              cta: '#FF9800',
              dark: '#2E3B2E'
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              serif: ['Playfair Display', 'serif'],
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
      :root {
        --sat: env(safe-area-inset-top);
        --sar: env(safe-area-inset-right);
        --sab: env(safe-area-inset-bottom);
        --sal: env(safe-area-inset-left);
      }

      body { 
        font-family: 'Inter', sans-serif; 
        overflow-x: hidden;
        padding-top: var(--sat);
        padding-left: var(--sal);
        padding-right: var(--sar);
      }
      
      h1, h2, h3 { font-family: 'Playfair Display', serif; }
      
      html {
        scroll-behavior: smooth;
      }
      
      [id] {
        scroll-margin-top: calc(5rem + var(--sat));
      }

      /* Global Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }

      ::-webkit-scrollbar-track {
        background: #f9fafb; /* gray-50 */
      }

      ::-webkit-scrollbar-thumb {
        background: #4CAF50; /* primary green */
        border-radius: 100px;
        border: 2px solid #f9fafb; /* creates a "floating" thumb look */
      }

      ::-webkit-scrollbar-thumb:hover {
        background: #3d8b40; /* darker green on hover */
      }

      /* Firefox Scrollbar Support */
      * {
        scrollbar-width: thin;
        scrollbar-color: #4CAF50 #f9fafb;
      }

      .hide-scrollbar::-webkit-scrollbar { display: none; }
      .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

      .gsap-reveal {
        opacity: 0;
        visibility: hidden;
      }

      /* Improved momentum scrolling for iOS */
      .scroll-touch {
        -webkit-overflow-scrolling: touch;
      }

      /* Fix for mobile height issues (the 100vh bug) */
      .min-h-screen-ios {
        min-height: -webkit-fill-available;
      }
    </style>
<script type="importmap">
{

    "@google/genai": "https://esm.sh/@google/genai@^1.38.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "gsap": "https://esm.sh/gsap@^3.12.5",
    "gsap/ScrollTrigger": "https://esm.sh/gsap@^3.12.5/ScrollTrigger",
    "gsap/": "https://esm.sh/gsap@^3.14.2/"
  }
}
</script>
</head>
<body class="bg-white text-dark min-h-screen-ios">
    <div id="root"></div>
</body>
</html>
